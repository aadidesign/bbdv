name: Keep chatbot warm

# Render's free tier spins the chatbot down after ~15 min idle, which causes a
# slow cold start on the next visitor's first message. This pings the health
# endpoint every ~10 min so the service stays awake.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC; best-effort on GitHub)
  workflow_dispatch:          # allows manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="https://bbdv-z918.onrender.com/health"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "Service did not return 200 yet (it may still be waking). Not failing the job."
