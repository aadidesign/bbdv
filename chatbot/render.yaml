services:
  - type: web
    name: bbdv-chatbot
    runtime: node
    plan: free
    rootDir: chatbot
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health
